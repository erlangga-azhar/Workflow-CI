name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run training model with MLflow
        run: mlflow run MLProject --env-manager=local

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifacts
          path: MLProject/mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          # --env-manager=local + --build-arg akan membuat MLflow menggunakan environment yang sudah ada
          mlflow models build-docker \
            -m runs:/$RUN_ID/model \
            -n ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest \
            --env-manager=local
          docker push ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest